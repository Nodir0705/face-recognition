<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Attendance{% endblock %}</title>
<style>
  :root {
    --bg: #fafaf7;
    --card: #ffffff;
    --text: #222;
    --muted: #6a6a66;
    --border: #e5e3dc;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --success: #16a34a;
    --success-bg: #ecfdf5;
    --warning: #d97706;
    --danger: #dc2626;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg); color: var(--text);
    margin: 0; padding: 0;
    line-height: 1.5;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .nav { display: flex; gap: 16px; padding: 16px 24px; border-bottom: 1px solid var(--border); background: white; }
  .nav a { color: var(--text); text-decoration: none; font-weight: 500; padding: 4px 8px; border-radius: 6px; }
  .nav a:hover { background: #f0eee7; }
  .nav a.active { color: var(--accent); }
  h1 { font-size: 24px; font-weight: 600; margin: 0 0 4px; }
  h2 { font-size: 18px; font-weight: 600; margin: 28px 0 12px; }
  .muted { color: var(--muted); font-size: 14px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; font-weight: 600; color: var(--muted); padding: 10px 12px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  input, select, button {
    font-family: inherit; font-size: 14px;
    padding: 10px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: white;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  button {
    cursor: pointer; font-weight: 500; background: var(--accent); color: white; border: none;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent-hover); }
  button.secondary { background: white; color: var(--text); border: 1px solid var(--border); }
  button.secondary:hover { background: #f3f1ea; }
  button.danger { background: var(--danger); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 12px; font-weight: 500;
  }
  .badge.in { background: var(--success-bg); color: var(--success); }
  .badge.out { background: #fef3c7; color: var(--warning); }
  .badge.synced { color: var(--success); }
  .badge.pending { color: var(--warning); }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav class="nav">
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
  <a href="/enroll" {% if request.path == '/enroll' %}class="active"{% endif %}>Enroll</a>
  <a href="/kiosk" target="_blank">Kiosk view ↗</a>
</nav>
<div class="container">
  {% block body %}{% endblock %}
</div>
</body>
</html>
